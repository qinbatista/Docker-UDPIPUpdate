name: Route53 DNS Update

on:
  workflow_dispatch:
    inputs:
      zone_name:
        description: Route 53 hosted zone name
        required: true
        default: qyp.life
      domain_name:
        description: DNS record name
        required: true
        default: timov4.qyp.life
      ipv4:
        description: IPv4 address for the A record
        required: true
        default: 54.249.229.136

jobs:
  update:
    runs-on: ubuntu-latest
    environment: BuildEnv

    steps:
      - name: Upsert A record
        env:
          AWS_KEY_VALUE: ${{ secrets.AWS_KEY }}
          AWS_ACCESS_VALUE: ${{ secrets.AWS_ACCESS }}
          ZONE_NAME: ${{ inputs.zone_name }}
          DOMAIN_NAME: ${{ inputs.domain_name }}
          IPV4: ${{ inputs.ipv4 }}
        run: |
          set -euo pipefail

          configure_aws() {
            export AWS_ACCESS_KEY_ID="$1"
            export AWS_SECRET_ACCESS_KEY="$2"
            export AWS_DEFAULT_REGION="us-west-2"
          }

          configure_aws "$AWS_KEY_VALUE" "$AWS_ACCESS_VALUE"
          if ! aws sts get-caller-identity >/dev/null 2>&1; then
            configure_aws "$AWS_ACCESS_VALUE" "$AWS_KEY_VALUE"
            aws sts get-caller-identity >/dev/null
          fi

          zone_name="${ZONE_NAME%.}."
          domain_name="${DOMAIN_NAME%.}."
          zone_id="$(aws route53 list-hosted-zones-by-name --dns-name "$zone_name" --query "HostedZones[?Name=='$zone_name'].Id | [0]" --output text)"

          if [ "$zone_id" = "None" ] || [ -z "$zone_id" ]; then
            echo "Hosted zone not found: $zone_name" >&2
            exit 1
          fi

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$zone_id" \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"$domain_name\",
                  \"Type\": \"A\",
                  \"TTL\": 60,
                  \"ResourceRecords\": [{\"Value\": \"$IPV4\"}]
                }
              }]
            }"
